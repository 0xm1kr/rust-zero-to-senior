<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Learn Rust · 404skills</title>
  <script>
    // Apply saved/preferred theme BEFORE the stylesheet paints to avoid FOUC.
    (function () {
      try {
        var stored = localStorage.getItem('rust-tut-theme');
        var prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
        var theme = stored || (prefersLight ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
      } catch (e) {
        document.documentElement.setAttribute('data-theme', 'dark');
      }
    })();
  </script>
  <link rel="stylesheet" href="styles/tokens.css" />
  <link rel="stylesheet" href="styles/base.css" />
  <link rel="stylesheet" href="styles/components.css" />
  <link rel="stylesheet" href="styles/sidebar.css" />
  <link rel="stylesheet" href="styles/lesson.css" />
  <link rel="stylesheet" href="vendor/codemirror/codemirror.min.css" />
  <link rel="stylesheet" href="vendor/codemirror/theme/material-darker.min.css" />
  <link rel="stylesheet" href="styles/playground.css" />
  <link rel="stylesheet" href="styles/chat.css" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%23DEA584'/%3E%3Ctext x='50%25' y='58%25' text-anchor='middle' fill='%23000' font-family='monospace' font-weight='700' font-size='30'%3ERs%3C/text%3E%3C/svg%3E" />
</head>
<body>
  <aside id="sidebar">
    <header>
      <div class="header-top">
        <div class="logo">
          <span class="logo-mark">Rs</span>
          <span class="logo-text">404skills</span>
        </div>
        <button id="theme-toggle" type="button" class="icon-btn" title="Toggle theme" aria-label="Toggle color theme">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <circle cx="12" cy="12" r="4"></circle>
            <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"></path>
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
        </button>
      </div>
      <input id="search" type="search" placeholder="Search lessons…" autocomplete="off" />
      <div id="progress-bar"><div id="progress-fill"></div></div>
      <div id="progress-label">0 / 0 complete</div>
    </header>
    <nav id="lesson-list"></nav>
    <footer>
      <button id="reset-progress" title="Clear completed lessons">Reset progress</button>
    </footer>
  </aside>

  <main id="content">
    <article id="lesson">
      <div id="lesson-meta">
        <span id="lesson-category"></span>
      </div>
      <h1 id="lesson-title">Loading…</h1>
      <section id="lesson-description"></section>

      <section id="key-takeaways" hidden>
        <h3>Key takeaways</h3>
        <ul id="lesson-notes"></ul>
      </section>

      <section id="playground">
        <div class="playground-head">
          <h3>Try it</h3>
          <div class="playground-actions">
            <button id="reset-code" class="btn-ghost">Reset</button>
            <button id="run-code" class="btn-primary">▶ Run</button>
          </div>
        </div>
        <textarea id="code" spellcheck="false" autocapitalize="off" autocorrect="off"></textarea>

        <div class="output-head">
          <h3>Output</h3>
          <span id="run-status"></span>
        </div>
        <pre id="output">Click <b>Run</b> to execute the code above.</pre>
      </section>

      <nav id="lesson-nav">
        <button id="prev-lesson">← Previous</button>
        <button id="mark-complete" class="btn-primary">Mark complete</button>
        <button id="next-lesson">Next →</button>
      </nav>
    </article>
  </main>

  <button id="ask-fab" type="button" class="ask-fab" aria-label="Ask AI about this lesson">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <path d="M12 2L13.5 7.5L19 9L13.5 10.5L12 16L10.5 10.5L5 9L10.5 7.5L12 2Z"></path>
      <path d="M19 15L19.75 17.25L22 18L19.75 18.75L19 21L18.25 18.75L16 18L18.25 17.25L19 15Z"></path>
    </svg>
    <span>Ask AI</span>
  </button>

  <aside id="chat-panel" class="chat-panel" data-open="false" aria-label="AI chat">
    <header class="chat-header">
      <div class="chat-title-block">
        <h3>Ask AI</h3>
        <p id="chat-context" class="chat-context">About: —</p>
      </div>
      <div class="chat-header-actions">
        <button id="chat-clear" type="button" class="icon-btn icon-btn--sm" title="Clear chat" aria-label="Clear chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M3 6h18M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"></path>
          </svg>
        </button>
        <button id="chat-close" type="button" class="icon-btn icon-btn--sm" title="Close chat" aria-label="Close chat">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <path d="M6 6l12 12M6 18L18 6"></path>
          </svg>
        </button>
      </div>
    </header>

    <div id="chat-messages" class="chat-messages"></div>

    <form id="chat-form" class="chat-form" autocomplete="off">
      <textarea id="chat-input" rows="2" placeholder="Ask anything about this lesson… (⌘/Ctrl + Enter to send)"></textarea>
      <div class="chat-form-actions">
        <span id="chat-meta" class="chat-meta"></span>
        <button id="chat-send" type="submit" class="btn-primary">Send</button>
      </div>
    </form>
  </aside>

  <!-- CodeMirror 5 (vendored under web/vendor/codemirror). The simple-mode
       addon must load BEFORE the Rust mode (which is built on top of it). -->
  <script src="vendor/codemirror/codemirror.min.js"></script>
  <script src="vendor/codemirror/addon/mode/simple.min.js"></script>
  <script src="vendor/codemirror/mode/rust/rust.min.js"></script>
  <script src="vendor/codemirror/addon/edit/closebrackets.min.js"></script>
  <script src="vendor/codemirror/addon/edit/matchbrackets.min.js"></script>

  <script type="module" src="js/app.js"></script>
</body>
</html>
